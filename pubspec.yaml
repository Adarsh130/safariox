name: safariox
description: "SafariOX India - Smart Student Trip Management Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.4

  # Auth
  google_sign_in: ^6.2.1

  # State & Navigation
  flutter_riverpod: ^3.3.2

  # Image & File Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  file_picker: ^8.1.7

  # QR Code
  qr_flutter: ^4.1.0

  # Payment
  razorpay_flutter: ^1.3.6

  # PDF & Printing
  pdf: ^3.11.1
  printing: ^5.14.2

  # Sharing
  share_plus: ^10.1.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.5

  # UI & Animation
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^22.0.0

  # Permissions
  permission_handler: ^12.0.3

  # Location
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.jpeg"
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpeg
    - assets/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
